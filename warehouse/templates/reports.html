<div class="page" id="page-reports">
    <h2 class="page-title">Báo cáo & Thống kê</h2>
    
    <div class="grid-2">
        <!-- Doanh thu theo khu vực -->
        <div class="card">
            <div class="card-header">
                <div class="card-title">📊 Doanh thu theo khu vực kho</div>
            </div>
            <div class="card-body">
                <div class="report-item">
                    <div class="report-label">Khu A - Hàng lạnh</div>
                    <div class="progress-bar">
                        <div class="progress-fill fill-blue" style="width: 71%"></div>
                    </div>
                    <div class="report-value">85M / 120M</div>
                </div>
                <div class="report-item">
                    <div class="report-label">Khu B - Công nghiệp</div>
                    <div class="progress-bar">
                        <div class="progress-fill fill-gold" style="width: 80%"></div>
                    </div>
                    <div class="report-value">112M / 140M</div>
                </div>
                <div class="report-item">
                    <div class="report-label">Khu C - Điện tử</div>
                    <div class="progress-bar">
                        <div class="progress-fill fill-green" style="width: 65%"></div>
                    </div>
                    <div class="report-value">65M / 100M</div>
                </div>
                <div class="report-item">
                    <div class="report-label">Khu D - Tổng hợp</div>
                    <div class="progress-bar">
                        <div class="progress-fill fill-red" style="width: 31%"></div>
                    </div>
                    <div class="report-value">25M / 80M</div>
                </div>
            </div>
        </div>

        <!-- Báo cáo nhanh -->
        <div class="card">
            <div class="card-header">
                <div class="card-title">⚡ Báo cáo nhanh</div>
            </div>
            <div class="card-body">
                <div class="quick-report-grid">
                    <button class="quick-btn" onclick="alert('Đang tạo báo cáo doanh thu...')">📈 Doanh thu tháng</button>
                    <button class="quick-btn" onclick="alert('Đang tạo báo cáo tình trạng kho...')">🏢 Tình trạng kho</button>
                    <button class="quick-btn" onclick="alert('Đang tạo danh sách hợp đồng sắp hết hạn...')">⏰ HĐ sắp hết hạn</button>
                    <button class="quick-btn" onclick="alert('Đang tạo báo cáo công nợ...')">💳 Công nợ khách hàng</button>
                </div>
            </div>
        </div>
    </div>
</div>
