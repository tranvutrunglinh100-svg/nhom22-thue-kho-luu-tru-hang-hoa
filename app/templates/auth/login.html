{% extends 'base.html' %}

{% block auth_content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon">W</div>
      <div class="auth-title">WareFlow</div>
      <div class="auth-sub">Hệ thống quản lý kho hàng</div>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="alert alert-{{ category }}" style="margin-bottom:14px">
          {{ message }}
        </div>
      {% endfor %}
    {% endwith %}

    <form method="POST" action="{{ url_for('auth.login') }}">
      <div class="form-group">
        <label class="form-label">Tên đăng nhập</label>
        <input type="text" name="username" class="form-control"
               placeholder="Nhập tên đăng nhập" required autofocus>
      </div>
      <div class="form-group">
        <label class="form-label">Mật khẩu</label>
        <input type="password" name="password" class="form-control"
               placeholder="••••••••" required>
      </div>
      <div class="form-group d-flex align-center gap-8">
        <input type="checkbox" name="remember" id="remember">
        <label for="remember" style="font-size:13px;color:var(--text-muted)">
          Ghi nhớ đăng nhập
        </label>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:10px">
        Đăng nhập
      </button>
    </form>
  </div>
</div>
{% endblock %}
