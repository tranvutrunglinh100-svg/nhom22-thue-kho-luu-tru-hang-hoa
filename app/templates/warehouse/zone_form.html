<!-- zone_form.html -->
{% extends 'base.html' %}
{% block title %}{{ 'Sửa' if zone else 'Tạo' }} khu vực{% endblock %}
{% block page_title %}{{ 'Chỉnh sửa' if zone else 'Tạo' }} khu vực kho{% endblock %}
{% block topbar_actions %}<a href="{{ url_for('warehouse.zone_list') }}" class="btn">← Quay lại</a>{% endblock %}
{% block content %}
<div style="max-width:460px">
  <div class="panel">
    <div class="panel-body">
      <form method="POST">
        {% if not zone %}
        <div class="form-group">
          <label class="form-label">Mã khu vực *</label>
          <input type="text" name="code" class="form-control" required placeholder="A" maxlength="5">
        </div>
        {% endif %}
        <div class="form-group">
          <label class="form-label">Tên khu vực *</label>
          <input type="text" name="name" class="form-control" required value="{{ zone.name if zone else '' }}"
            placeholder="Khu vực A">
        </div>
        <div class="form-group">
          <label class="form-label">Mô tả</label>
          <input type="text" name="description" class="form-control" value="{{ zone.description if zone else '' }}"
            placeholder="Hàng khô / Hàng lạnh...">
        </div>
        <div class="form-grid form-grid-2">
          <div class="form-group">
            <label class="form-label">Diện tích tối đa (m²)</label>
            <input type="number" name="max_area_m2" class="form-control" min="0" step="0.1"
              value="{{ zone.max_area_m2 if zone else 0 }}">
          </div>
          <div class="form-group">
            <label class="form-label">Tải trọng tối đa (kg)</label>
            <input type="number" name="max_weight_kg" class="form-control" min="0"
              value="{{ zone.max_weight_kg if zone else 0 }}">
          </div>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center">Lưu</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
